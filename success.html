<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Complete - Torex Codex</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #30363d;
            padding: 40px;
            border-radius: 8px;
            background-color: #161b22;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            max-width: 500px;
        }
        h1 { color: #00ff00; }
        .hidden { display: none; }
        .warning { color: #ff4444; font-weight: bold; font-size: 1.5rem; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #238636;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            border: 1px solid rgba(240, 246, 252, 0.1);
            transition: 0.2s;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #2ea043;
            box-shadow: 0 0 15px rgba(46, 160, 67, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 成功画面 -->
        <div id="download-zone" class="hidden">
            <h1>[ ACCESS GRANTED ]</h1>
            <p>Transaction verified. Welcome to the King's Court.</p>
            <p>Access your portal below.</p>
            <a id="dl-link" href="#" class="btn" target="_blank">Enter Torex Codex Portal</a>
        </div>

        <!-- 失敗・不正アクセス画面 -->
        <div id="thief-zone" class="hidden">
            <h1 style="color: #ff4444;">[ ACCESS DENIED ]</h1>
            <p class="warning">Amateur. You didn't pay.</p>
            <p>The system has logged your attempt.</p>
            <a href="./" class="btn" style="background-color: #30363d; margin-top: 30px;">Return</a>
        </div>
    </div>

    <script>
        // 暗号化されたGoogleドライブURL（第三者には解読不能）
        const encData = "jlG80C/vsmkqRmI6HacVjmJlfC3VWEm2tqU2FeNhoojVdKZCTSrDhE/RtfBJLCsK3MJgcFh1n2w/zqHRhM4Syn1elEOjUq3m";
        
        // パラメータから「鍵」を取得
        const urlParams = new URLSearchParams(window.location.search);
        const key = urlParams.get('key') || "";

        // 軽量復号関数
        function decrypt(dataB64, keyStr) {
            try {
                const data = atob(dataB64);
                let S = [], j = 0, x, res = '';
                for (let i = 0; i < 256; i++) S[i] = i;
                for (let i = 0; i < 256; i++) {
                    j = (j + S[i] + keyStr.charCodeAt(i % keyStr.length)) % 256;
                    x = S[i]; S[i] = S[j]; S[j] = x;
                }
                let i = 0; j = 0;
                for (let y = 0; y < data.length; y++) {
                    i = (i + 1) % 256; j = (j + S[i]) % 256;
                    x = S[i]; S[i] = S[j]; S[j] = x;
                    res += String.fromCharCode(data.charCodeAt(y) ^ S[(S[i] + S[j]) % 256]);
                }
                return res;
            } catch(e) { return null; }
        }

        // 鍵を使って「とりあえず復号」してみる
        const realUrl = decrypt(encData, key);

        // 復号した結果が「https」で始まっていれば、正しい鍵だったと判断する！
        if (realUrl && realUrl.startsWith("https://")) {
            document.getElementById('dl-link').href = realUrl;
            document.getElementById('download-zone').classList.remove('hidden');
            
            // 履歴とURLバーを強制上書きして、鍵ごと消し去る
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
        } else {
            // パラメータなし、または間違った鍵（デタラメな文字列に復号された場合）
            document.getElementById('thief-zone').classList.remove('hidden');
        }
    </script>
</body>
</html>
